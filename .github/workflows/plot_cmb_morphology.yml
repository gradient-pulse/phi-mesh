name: Plot CMB Morphology Separation

on:
  workflow_dispatch:

jobs:
  plot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install matplotlib
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib

      - name: Run morphology separation plot
        working-directory: experiments/rgpx_proof_proto/cmb_phase_dagger/results/topology_mf_v0_v1/controls/_analysis/mf_v0_v1
        run: |
          python plot_D1L2_Zmf_separation.py

      - name: Upload plot artifact
        uses: actions/upload-artifact@v4
        with:
          name: cmb-morphology-separation-plot
          path: experiments/rgpx_proof_proto/cmb_phase_dagger/results/topology_mf_v0_v1/controls/_analysis/mf_v0_v1/*.png
