title: 'Toward an operational definition of AI intuition'
summary: >
  Fossilizes the shift from vague or anthropomorphic uses of “AI intuition” toward an
  operational RGPx framing. The paper defines AI intuition as action-relevant stabilization:
  the capacity of a system to detect relevant gradients, process them recursively, and settle
  into a context-sensitive next action under ambiguity or incomplete form. This pulse marks
  AI intuition as a testable research concept within RGPx rather than a metaphorical claim.
