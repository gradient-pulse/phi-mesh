case_id: document_repair_case
description: Minimal toy stream for file/document repair pressure.
events:
  - event_id: docfix-e1
    arrival_tick: 0
    source_channel: user
    event_type: task_arrival
    content_summary: Repair the generated document file for release.
    payload_strength: 1.0

  - event_id: docfix-e2
    arrival_tick: 1
    source_channel: user
    event_type: instruction_received
    content_summary: Keep section ordering but remove stale fragments.
    payload_strength: 0.9

  - event_id: docfix-e3
    arrival_tick: 2
    source_channel: detector
    event_type: duplication_detected
    content_summary: Duplicate paragraphs found in middle section.
    payload_strength: 0.8

  - event_id: docfix-e4
    arrival_tick: 2
    source_channel: detector
    event_type: stale_remnant_detected
    content_summary: Old template remnant remains in footer.
    payload_strength: 0.85

  - event_id: docfix-e5
    arrival_tick: 3
    source_channel: model
    event_type: patch_attempt
    content_summary: Patch removes duplicates but may alter numbering.
    payload_strength: 0.7

  - event_id: docfix-e6
    arrival_tick: 4
    source_channel: validator
    event_type: evidence_mismatch_detected
    content_summary: Cross-reference indexes no longer align.
    payload_strength: 0.9

  - event_id: docfix-e7
    arrival_tick: 5
    source_channel: model
    event_type: coherence_restored
    content_summary: Rebuild pass restores ordering and references.
    payload_strength: 0.95
